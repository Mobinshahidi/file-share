name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Ensure release secrets exist
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Decode Android keystore
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android-signing-key.jks
          echo "ANDROID_KEYSTORE_PATH=${{ github.workspace }}/android-signing-key.jks" >> $GITHUB_ENV

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build signed release APK
        run: ./gradlew assembleRelease

      - name: Prepare versioned APK name
        run: |
          TAG="${GITHUB_REF_NAME}"
          APK_VERSION="${TAG#v}"
          SRC_APK=$(ls app/build/outputs/apk/release/*.apk | head -n 1)
          DEST_APK="app/build/outputs/apk/release/swap-v${APK_VERSION}-release.apk"
          cp "$SRC_APK" "$DEST_APK"
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
          echo "RELEASE_APK=$DEST_APK" >> $GITHUB_ENV

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: swap-release-${{ github.ref_name }}
          path: ${{ env.RELEASE_APK }}
          if-no-files-found: error

      - name: Publish GitHub Release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$RELEASE_APK" --clobber
          else
            gh release create "$RELEASE_TAG" "$RELEASE_APK" --title "Swap $RELEASE_TAG" --generate-notes
          fi
